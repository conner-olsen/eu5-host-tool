l_german:
 # Mod
 ht_name: "Host-Tool"
 ht_desc: "Multiplayer-Host-Tool mit konfigurierbaren Aktionen und Protokollierung der Transparenz."

 # Settings (settings) Tab
 ht__settings_name: "Einstellungen"
 ## Amounts (amounts) Group
 ht__settings__amounts_name: "Beträge"
 ht__gold_amount_name: "Goldmenge"
 ht__gold_amount_desc: "Goldmenge, die mit der Aktion „Gold hinzufügen“ hinzugefügt werden soll. Negative Werte führen stattdessen zu einem Abzug von Gold."
 ht__gold_amount_format: "[CMMV('ht__gold_amount')]"
 ht__manpower_amount_name: "Personalbestand"
 ht__manpower_amount_desc: "Anzahl der Arbeitskräfte, die mit der Aktion „Arbeitskräfte hinzufügen“ hinzugefügt werden sollen. Negative Werte führen stattdessen zu einer Verringerung der Arbeitskräfte."
 ht__manpower_amount_format: "[CMMV('ht__manpower_amount')]"
 ht__stability_amount_name: "Stabilitätsmenge"
 ht__stability_amount_desc: "Umfang der Stabilität, die mit der Aktion „Stabilität hinzufügen“ hinzugefügt werden soll. Negative Werte führen stattdessen zu einer Verringerung der Stabilität."
 ht__stability_amount_format: "[CMMV('ht__stability_amount')]"
 ht__prestige_amount_name: "Prestige-Betrag"
 ht__prestige_amount_desc: "Anzahl der Prestigepunkte, die mit der Aktion „Prestige hinzufügen“ hinzugefügt werden sollen. Negative Werte führen stattdessen zu einem Abzug von Prestigepunkten."
 ht__prestige_amount_format: "[CMMV('ht__prestige_amount')]"
 ht__diplomats_amount_name: "Anzahl der Diplomaten"
 ht__diplomats_amount_desc: "Anzahl der Diplomaten, die mit der Aktion „Diplomaten hinzufügen“ hinzugefügt werden sollen. Negative Werte führen stattdessen zum Entfernen von Diplomaten."
 ht__diplomats_amount_format: "[CMMV('ht__diplomats_amount')]"
 ht__truce_years_name: "Dauer des Waffenstillstands (Jahre)"
 ht__truce_years_desc: "Dauer der Waffenstillstände, die durch die Aktion „Waffenstillstand hinzufügen“ geschaffen wurden."
 ht__truce_years_format: "[CMMV('ht__truce_years')]"
 ht__religion_conversion_percentage_name: "Prozentualer Anteil der Konvertiten"
 ht__religion_conversion_percentage_desc: "Prozentualer Anteil der Bevölkerung, die durch die Aktion „Bevölkerung konvertieren“ zur Hauptreligion konvertiert wurde."
 ht__religion_conversion_percentage_format: "[CMMV('ht__religion_conversion_percentage')]%"
 ht__culture_assimilation_percentage_name: "Prozentsatz der kulturellen Assimilation"
 ht__culture_assimilation_percentage_desc: "Prozentualer Anteil der Populationen, die durch die Aktion „Assimilate Pops“ in die Primärkultur integriert wurden."
 ht__culture_assimilation_percentage_format: "[CMMV('ht__culture_assimilation_percentage')]%"
 ht__war_exhaustion_amount_name: "Höhe der Kriegserschöpfung"
 ht__war_exhaustion_amount_desc: "Umfang der Kriegsmüdigkeit, auf den die Aktion „Kriegsmüdigkeit ändern“ angewendet wird. Negative Werte heben sie auf, positive Werte erhöhen sie."
 ht__war_exhaustion_amount_format: "[CMMV('ht__war_exhaustion_amount')]"

 # Optional: self-referencing flag keys to suppress IDE warnings (safe to remove if you want)
 ht: "ht"
 ht__settings: "ht__settings"
 ht__settings__amounts: "ht__settings__amounts"
 ht__gold_amount: "ht__gold_amount"
 ht__manpower_amount: "ht__manpower_amount"
 ht__stability_amount: "ht__stability_amount"
 ht__prestige_amount: "ht__prestige_amount"
 ht__diplomats_amount: "ht__diplomats_amount"
 ht__truce_years: "ht__truce_years"
 ht__religion_conversion_percentage: "ht__religion_conversion_percentage"
 ht__culture_assimilation_percentage: "ht__culture_assimilation_percentage"
 ht__war_exhaustion_amount: "ht__war_exhaustion_amount"
