l_turkish:
 # Mod
 ht_name: "Ana Bilgisayar Aracı"
 ht_desc: "Yapılandırılabilir eylemler ve şeffaf günlük kaydı özelliklerine sahip çok oyunculu sunucu aracı."

 # Settings (settings) Tab
 ht__settings_name: "Ayarlar"
 ## Amounts (amounts) Group
 ht__settings__amounts_name: "Tutarlar"
 ht__gold_amount_name: "Altın Miktarı"
 ht__gold_amount_desc: "“Altın Ekle” eylemiyle eklenecek altın miktarı. Negatif değerler ise altın çekilmesini sağlar."
 ht__gold_amount_format: "[CMMV('ht__gold_amount')]"
 ht__manpower_amount_name: "İşgücü Miktarı"
 ht__manpower_amount_desc: "“İşgücü Ekle” eylemiyle eklenecek işgücü miktarı. Negatif değerler ise işgücünü azaltır."
 ht__manpower_amount_format: "[CMMV('ht__manpower_amount')]"
 ht__stability_amount_name: "İstikrar Miktarı"
 ht__stability_amount_desc: "“Kararlılık Ekle” eylemiyle eklenecek kararlılık miktarı. Negatif değerler ise kararlılığı azaltır."
 ht__stability_amount_format: "[CMMV('ht__stability_amount')]"
 ht__prestige_amount_name: "Prestij Tutarı"
 ht__prestige_amount_desc: "“Prestij Ekle” eylemiyle eklenecek prestij miktarı. Negatif değerler ise prestij azaltır."
 ht__prestige_amount_format: "[CMMV('ht__prestige_amount')]"
 ht__diplomats_amount_name: "Diplomat Sayısı"
 ht__diplomats_amount_desc: "“Diplomat Ekle” eylemiyle eklenecek diplomat sayısı. Negatif değerler ise diplomatların kaldırılmasına neden olur."
 ht__diplomats_amount_format: "[CMMV('ht__diplomats_amount')]"
 ht__truce_years_name: "Ateşkes Süresi (Yıl)"
 ht__truce_years_desc: "\"Ateşkes Ekle\" eylemiyle oluşturulan ateşkeslerin süresi."
 ht__truce_years_format: "[CMMV('ht__truce_years')]"
 ht__religion_conversion_percentage_name: "Din Değiştirme Oranı"
 ht__religion_conversion_percentage_desc: "“Nüfusu Dönüştür” eylemiyle birincil dine dönüştürülen nüfusun yüzdesi."
 ht__religion_conversion_percentage_format: "[CMMV('ht__religion_conversion_percentage')]%"
 ht__culture_assimilation_percentage_name: "Kültürel Asimilasyon Oranı"
 ht__culture_assimilation_percentage_desc: "“Assimilate Pops” işlemiyle birincil kültüre asimile edilen popülasyonların yüzdesi."
 ht__culture_assimilation_percentage_format: "[CMMV('ht__culture_assimilation_percentage')]%"
 ht__war_exhaustion_amount_name: "Savaş Yorgunluğu Miktarı"
 ht__war_exhaustion_amount_desc: "“Savaş Yorgunluğunu Değiştir” eyleminin uyguladığı savaş yorgunluğu miktarı. Negatif değerler bu miktarı azaltır, pozitif değerler ise artırır."
 ht__war_exhaustion_amount_format: "[CMMV('ht__war_exhaustion_amount')]"

