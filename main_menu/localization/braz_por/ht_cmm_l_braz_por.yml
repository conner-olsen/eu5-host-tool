l_braz_por:
 # Mod
 ht_name: "Ferramenta do anfitrião"
 ht_desc: "Ferramenta de hospedagem para multijogador com ações configuráveis e registro de transparência."

 # Settings (settings) Tab
 ht__settings_name: "Configurações"
 ## Amounts (amounts) Group
 ht__settings__amounts_name: "Valores"
 ht__gold_amount_name: "Quantidade de ouro"
 ht__gold_amount_desc: "Quantidade de ouro a ser adicionada com a ação “Adicionar ouro”. Valores negativos, ao contrário, removem ouro."
 ht__gold_amount_format: "[CMMV('ht__gold_amount')]"
 ht__manpower_amount_name: "Quantidade de mão de obra"
 ht__manpower_amount_desc: "Quantidade de pessoal a ser adicionada com a ação “Adicionar pessoal”. Valores negativos, por sua vez, removem pessoal."
 ht__manpower_amount_format: "[CMMV('ht__manpower_amount')]"
 ht__stability_amount_name: "Quantidade de Estabilidade"
 ht__stability_amount_desc: "Quantidade de estabilidade a ser adicionada com a ação “Adicionar estabilidade”. Valores negativos, por outro lado, removem estabilidade."
 ht__stability_amount_format: "[CMMV('ht__stability_amount')]"
 ht__prestige_amount_name: "Valor do Prêmio"
 ht__prestige_amount_desc: "Quantidade de prestígio a ser adicionada com a ação “Adicionar Prestígio”. Valores negativos, ao contrário, removem prestígio."
 ht__prestige_amount_format: "[CMMV('ht__prestige_amount')]"
 ht__diplomats_amount_name: "Valor dos diplomas"
 ht__diplomats_amount_desc: "Número de diplomatas a serem adicionados com a ação “Adicionar diplomatas”. Valores negativos, por sua vez, removem diplomatas."
 ht__diplomats_amount_format: "[CMMV('ht__diplomats_amount')]"
 ht__truce_years_name: "Duração da trégua (anos)"
 ht__truce_years_desc: "Duração das tréguas criadas pela ação “Adicionar trégua”."
 ht__truce_years_format: "[CMMV('ht__truce_years')]"
 ht__religion_conversion_percentage_name: "Porcentagem de conversão religiosa"
 ht__religion_conversion_percentage_desc: "Porcentagem da população convertida à religião principal por meio da ação “Converter População”."
 ht__religion_conversion_percentage_format: "[CMMV('ht__religion_conversion_percentage')]%"
 ht__culture_assimilation_percentage_name: "Porcentagem de assimilação cultural"
 ht__culture_assimilation_percentage_desc: "Porcentagem de populações assimiladas à cultura primária pela ação “Assimilate Pops”."
 ht__culture_assimilation_percentage_format: "[CMMV('ht__culture_assimilation_percentage')]%"
 ht__war_exhaustion_amount_name: "Valor do esgotamento de guerra"
 ht__war_exhaustion_amount_desc: "Quantidade de exaustão de guerra que a ação “Alterar exaustão de guerra” aplica. Valores negativos a removem, valores positivos a aumentam."
 ht__war_exhaustion_amount_format: "[CMMV('ht__war_exhaustion_amount')]"

 # Optional: self-referencing flag keys to suppress IDE warnings (safe to remove if you want)
 ht: "ht"
 ht__settings: "ht__settings"
 ht__settings__amounts: "ht__settings__amounts"
 ht__gold_amount: "ht__gold_amount"
 ht__manpower_amount: "ht__manpower_amount"
 ht__stability_amount: "ht__stability_amount"
 ht__prestige_amount: "ht__prestige_amount"
 ht__diplomats_amount: "ht__diplomats_amount"
 ht__truce_years: "ht__truce_years"
 ht__religion_conversion_percentage: "ht__religion_conversion_percentage"
 ht__culture_assimilation_percentage: "ht__culture_assimilation_percentage"
 ht__war_exhaustion_amount: "ht__war_exhaustion_amount"
