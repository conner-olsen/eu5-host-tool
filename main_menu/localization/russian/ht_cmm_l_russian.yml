l_russian:
 # Mod
 ht_name: "Инструмент хоста"
 ht_desc: "Инструмент для хостинга многопользовательских игр с настраиваемыми действиями и ведением журнала прозрачности."

 # Settings (settings) Tab
 ht__settings_name: "Настройки"
 ## Amounts (amounts) Group
 ht__settings__amounts_name: "Суммы"
 ht__gold_amount_name: "Количество золота"
 ht__gold_amount_desc: "Количество золота, которое будет добавлено при выполнении действия «Добавить золото». Отрицательные значения означают, что золото будет удалено."
 ht__gold_amount_format: "[CMMV('ht__gold_amount')]"
 ht__manpower_amount_name: "Численность персонала"
 ht__manpower_amount_desc: "Количество персонала, которое будет добавлено с помощью действия «Добавить персонал». Отрицательные значения означают удаление персонала."
 ht__manpower_amount_format: "[CMMV('ht__manpower_amount')]"
 ht__stability_amount_name: "Количество стабильности"
 ht__stability_amount_desc: "Значение стабильности, которое будет добавлено с помощью действия «Добавить стабильность». Отрицательные значения, напротив, уменьшают стабильность."
 ht__stability_amount_format: "[CMMV('ht__stability_amount')]"
 ht__prestige_amount_name: "Престижная сумма"
 ht__prestige_amount_desc: "Количество престижа, которое будет добавлено при выполнении действия «Добавить престиж». Отрицательные значения, напротив, приводят к потере престижа."
 ht__prestige_amount_format: "[CMMV('ht__prestige_amount')]"
 ht__diplomats_amount_name: "Число дипломатов"
 ht__diplomats_amount_desc: "Количество дипломатов, которых нужно добавить с помощью действия «Добавить дипломатов». Отрицательные значения означают удаление дипломатов."
 ht__diplomats_amount_format: "[CMMV('ht__diplomats_amount')]"
 ht__truce_years_name: "Продолжительность перемирия (в годах)"
 ht__truce_years_desc: "Продолжительность перемирий, созданных с помощью действия «Добавить перемирие»."
 ht__truce_years_format: "[CMMV('ht__truce_years')]"
 ht__religion_conversion_percentage_name: "Процент перехода в другую религию"
 ht__religion_conversion_percentage_desc: "Процент населения, обращенного в основную религию с помощью действия «Обратить население»."
 ht__religion_conversion_percentage_format: "[CMMV('ht__religion_conversion_percentage')]%"
 ht__culture_assimilation_percentage_name: "Процент культурной ассимиляции"
 ht__culture_assimilation_percentage_desc: "Процент популяций, ассимилированных в первичную культуру с помощью действия «Ассимилировать популяции»."
 ht__culture_assimilation_percentage_format: "[CMMV('ht__culture_assimilation_percentage')]%"
 ht__war_exhaustion_amount_name: "Величина военного истощения"
 ht__war_exhaustion_amount_desc: "Величина военного истощения, на которую влияет действие «Изменить военное истощение». Отрицательные значения уменьшают его, положительные — увеличивают."
 ht__war_exhaustion_amount_format: "[CMMV('ht__war_exhaustion_amount')]"

 # Optional: self-referencing flag keys to suppress IDE warnings (safe to remove if you want)
 ht: "ht"
 ht__settings: "ht__settings"
 ht__settings__amounts: "ht__settings__amounts"
 ht__gold_amount: "ht__gold_amount"
 ht__manpower_amount: "ht__manpower_amount"
 ht__stability_amount: "ht__stability_amount"
 ht__prestige_amount: "ht__prestige_amount"
 ht__diplomats_amount: "ht__diplomats_amount"
 ht__truce_years: "ht__truce_years"
 ht__religion_conversion_percentage: "ht__religion_conversion_percentage"
 ht__culture_assimilation_percentage: "ht__culture_assimilation_percentage"
 ht__war_exhaustion_amount: "ht__war_exhaustion_amount"
