l_polish:
 # Mod
 ht_name: "Narzędzie hosta"
 ht_desc: "Narzędzie do hostowania trybu wieloosobowego z możliwością konfiguracji akcji i rejestrowaniem przezroczystości."

 # Settings (settings) Tab
 ht__settings_name: "Ustawienia"
 ## Amounts (amounts) Group
 ht__settings__amounts_name: "Kwoty"
 ht__gold_amount_name: "Ilość złota"
 ht__gold_amount_desc: "Ilość złota, jaką należy dodać za pomocą akcji „Dodaj złoto”. Wartości ujemne powodują natomiast usunięcie złota."
 ht__gold_amount_format: "[CMMV('ht__gold_amount')]"
 ht__manpower_amount_name: "Liczba pracowników"
 ht__manpower_amount_desc: "Liczba pracowników, których należy dodać za pomocą akcji „Dodaj pracowników”. Wartości ujemne powodują natomiast usunięcie pracowników."
 ht__manpower_amount_format: "[CMMV('ht__manpower_amount')]"
 ht__stability_amount_name: "Wartość stabilności"
 ht__stability_amount_desc: "Wartość stabilności, jaką należy dodać za pomocą akcji „Dodaj stabilność”. Wartości ujemne powodują natomiast usunięcie stabilności."
 ht__stability_amount_format: "[CMMV('ht__stability_amount')]"
 ht__prestige_amount_name: "Kwota prestiżowa"
 ht__prestige_amount_desc: "Ilość prestiżu, jaką należy dodać za pomocą akcji „Dodaj prestiż”. Wartości ujemne powodują natomiast odebranie prestiżu."
 ht__prestige_amount_format: "[CMMV('ht__prestige_amount')]"
 ht__diplomats_amount_name: "Liczba dyplomatów"
 ht__diplomats_amount_desc: "Liczba dyplomatów, których należy dodać za pomocą akcji „Dodaj dyplomatów”. Wartości ujemne powodują natomiast usunięcie dyplomatów."
 ht__diplomats_amount_format: "[CMMV('ht__diplomats_amount')]"
 ht__truce_years_name: "Czas trwania rozejmu (w latach)"
 ht__truce_years_desc: "Czas trwania rozejmów utworzonych za pomocą akcji „Dodaj rozejm”."
 ht__truce_years_format: "[CMMV('ht__truce_years')]"
 ht__religion_conversion_percentage_name: "Odsetek osób zmieniających wyznanie"
 ht__religion_conversion_percentage_desc: "Odsetek populacji, która przeszła na religię główną w wyniku działania „Przekształć populację”."
 ht__religion_conversion_percentage_format: "[CMMV('ht__religion_conversion_percentage')]%"
 ht__culture_assimilation_percentage_name: "Odsetek asymilacji kulturowej"
 ht__culture_assimilation_percentage_desc: "Odsetek populacji wchłoniętych do kultury pierwotnej w ramach operacji „Assimilate Pops”."
 ht__culture_assimilation_percentage_format: "[CMMV('ht__culture_assimilation_percentage')]%"
 ht__war_exhaustion_amount_name: "Wysokość zasiłku z tytułu wyczerpania wojennego"
 ht__war_exhaustion_amount_desc: "Wartość zmęczenia wojennego, na którą wpływa akcja „Zmień zmęczenie wojenne”. Wartości ujemne zmniejszają tę wartość, a wartości dodatnie ją zwiększają."
 ht__war_exhaustion_amount_format: "[CMMV('ht__war_exhaustion_amount')]"

