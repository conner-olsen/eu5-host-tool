l_french:
 # Mod
 ht_name: "Outil d'hébergement"
 ht_desc: "Outil d'hébergement multijoueur avec des actions configurables et une journalisation transparente."

 # Settings (settings) Tab
 ht__settings_name: "Paramètres"
 ## Amounts (amounts) Group
 ht__settings__amounts_name: "Montants"
 ht__gold_amount_name: "Montant en or"
 ht__gold_amount_desc: "Quantité d'or à ajouter via l'action « Ajouter de l'or ». Les valeurs négatives entraînent au contraire un retrait d'or."
 ht__gold_amount_format: "[CMMV('ht__gold_amount')]"
 ht__manpower_amount_name: "Effectif"
 ht__manpower_amount_desc: "Nombre d'effectifs à ajouter via l'action « Ajouter des effectifs ». Les valeurs négatives entraînent au contraire une réduction des effectifs."
 ht__manpower_amount_format: "[CMMV('ht__manpower_amount')]"
 ht__stability_amount_name: "Montant de stabilité"
 ht__stability_amount_desc: "Quantité de stabilité à ajouter via l'action « Ajouter de la stabilité ». Les valeurs négatives réduisent la stabilité."
 ht__stability_amount_format: "[CMMV('ht__stability_amount')]"
 ht__prestige_amount_name: "Montant « Prestige »"
 ht__prestige_amount_desc: "Quantité de prestige à ajouter via l'action « Ajouter du prestige ». Les valeurs négatives entraînent au contraire une perte de prestige."
 ht__prestige_amount_format: "[CMMV('ht__prestige_amount')]"
 ht__diplomats_amount_name: "Nombre de diplomates"
 ht__diplomats_amount_desc: "Nombre de diplomates à ajouter via l'action « Ajouter des diplomates ». Les valeurs négatives permettent au contraire de supprimer des diplomates."
 ht__diplomats_amount_format: "[CMMV('ht__diplomats_amount')]"
 ht__truce_years_name: "Durée de la trêve (en années)"
 ht__truce_years_desc: "Durée des trêves créées par l'action « Ajouter une trêve »."
 ht__truce_years_format: "[CMMV('ht__truce_years')]"
 ht__religion_conversion_percentage_name: "Pourcentage de conversion religieuse"
 ht__religion_conversion_percentage_desc: "Pourcentage de la population convertie à la religion principale grâce à l'action « Convertir la population »."
 ht__religion_conversion_percentage_format: "[CMMV('ht__religion_conversion_percentage')]%"
 ht__culture_assimilation_percentage_name: "Pourcentage d'assimilation culturelle"
 ht__culture_assimilation_percentage_desc: "Pourcentage de populations assimilées à la culture primaire par l'action « Assimilate Pops »."
 ht__culture_assimilation_percentage_format: "[CMMV('ht__culture_assimilation_percentage')]%"
 ht__war_exhaustion_amount_name: "Montant de l'épuisement dû à la guerre"
 ht__war_exhaustion_amount_desc: "Niveau d'épuisement dû à la guerre auquel s'applique l'action « Modifier l'épuisement dû à la guerre ». Les valeurs négatives le réduisent, tandis que les valeurs positives l'augmentent."
 ht__war_exhaustion_amount_format: "[CMMV('ht__war_exhaustion_amount')]"

 # Optional: self-referencing flag keys to suppress IDE warnings (safe to remove if you want)
 ht: "ht"
 ht__settings: "ht__settings"
 ht__settings__amounts: "ht__settings__amounts"
 ht__gold_amount: "ht__gold_amount"
 ht__manpower_amount: "ht__manpower_amount"
 ht__stability_amount: "ht__stability_amount"
 ht__prestige_amount: "ht__prestige_amount"
 ht__diplomats_amount: "ht__diplomats_amount"
 ht__truce_years: "ht__truce_years"
 ht__religion_conversion_percentage: "ht__religion_conversion_percentage"
 ht__culture_assimilation_percentage: "ht__culture_assimilation_percentage"
 ht__war_exhaustion_amount: "ht__war_exhaustion_amount"
