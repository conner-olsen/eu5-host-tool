l_spanish:
 # Mod
 ht_name: "Herramienta de alojamiento"
 ht_desc: "Herramienta para alojar partidas multijugador con acciones configurables y registro de transparencia."

 # Settings (settings) Tab
 ht__settings_name: "Configuración"
 ## Amounts (amounts) Group
 ht__settings__amounts_name: "Importes"
 ht__gold_amount_name: "Cantidad de oro"
 ht__gold_amount_desc: "Cantidad de oro que se añadirá con la acción «Añadir oro». Los valores negativos, en cambio, eliminan oro."
 ht__gold_amount_format: "[CMMV('ht__gold_amount')]"
 ht__manpower_amount_name: "Número de trabajadores"
 ht__manpower_amount_desc: "Cantidad de personal que se añadirá con la acción «Añadir personal». Los valores negativos, en cambio, eliminan personal."
 ht__manpower_amount_format: "[CMMV('ht__manpower_amount')]"
 ht__stability_amount_name: "Stability Amount"
 ht__stability_amount_desc: "Cantidad de estabilidad que se añade con la acción «Añadir estabilidad». Los valores negativos, por el contrario, restan estabilidad."
 ht__stability_amount_format: "[CMMV('ht__stability_amount')]"
 ht__prestige_amount_name: "Importe de prestigio"
 ht__prestige_amount_desc: "Cantidad de prestigio que se añade con la acción «Añadir prestigio». Los valores negativos, en cambio, restan prestigio."
 ht__prestige_amount_format: "[CMMV('ht__prestige_amount')]"
 ht__diplomats_amount_name: "Número de diplomáticos"
 ht__diplomats_amount_desc: "Número de diplomáticos que se añadirán con la acción «Añadir diplomáticos». Los valores negativos eliminan diplomáticos."
 ht__diplomats_amount_format: "[CMMV('ht__diplomats_amount')]"
 ht__truce_years_name: "Duración de la tregua (años)"
 ht__truce_years_desc: "Duración de las treguas creadas mediante la acción «Añadir tregua»."
 ht__truce_years_format: "[CMMV('ht__truce_years')]"
 ht__religion_conversion_percentage_name: "Porcentaje de conversión religiosa"
 ht__religion_conversion_percentage_desc: "Porcentaje de población convertida a la religión principal mediante la acción «Convertir población»."
 ht__religion_conversion_percentage_format: "[CMMV('ht__religion_conversion_percentage')]%"
 ht__culture_assimilation_percentage_name: "Porcentaje de asimilación cultural"
 ht__culture_assimilation_percentage_desc: "Porcentaje de poblaciones asimiladas al cultivo primario mediante la acción «Asimilar poblaciones»."
 ht__culture_assimilation_percentage_format: "[CMMV('ht__culture_assimilation_percentage')]%"
 ht__war_exhaustion_amount_name: "Importe por agotamiento de guerra"
 ht__war_exhaustion_amount_desc: "Cantidad de agotamiento de guerra que aplica la acción «Cambiar agotamiento de guerra». Los valores negativos lo eliminan, mientras que los valores positivos lo añaden."
 ht__war_exhaustion_amount_format: "[CMMV('ht__war_exhaustion_amount')]"

 # Optional: self-referencing flag keys to suppress IDE warnings (safe to remove if you want)
 ht: "ht"
 ht__settings: "ht__settings"
 ht__settings__amounts: "ht__settings__amounts"
 ht__gold_amount: "ht__gold_amount"
 ht__manpower_amount: "ht__manpower_amount"
 ht__stability_amount: "ht__stability_amount"
 ht__prestige_amount: "ht__prestige_amount"
 ht__diplomats_amount: "ht__diplomats_amount"
 ht__truce_years: "ht__truce_years"
 ht__religion_conversion_percentage: "ht__religion_conversion_percentage"
 ht__culture_assimilation_percentage: "ht__culture_assimilation_percentage"
 ht__war_exhaustion_amount: "ht__war_exhaustion_amount"
