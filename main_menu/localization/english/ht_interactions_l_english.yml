 # Category
 CATEGORY_HT_ACTIONS: "@CATEGORY_HT_ACTIONS! Host Tools"

 # ── Target Toggle ────────────────────────────────────────────────────────────
 ht_toggle_target: "#V Target: $ht_current_target_label$#!"
 ht_toggle_target_desc: "Toggle whether host tool interactions apply to the selected country or to your own country."
 ht_toggle_target_act: "Toggle target mode (Currently: $ht_current_target_label_act$)."
 ht_toggle_target_effect_text: "Toggle target mode."
 ht_toggle_target_effect_text_past: "Toggled target mode."
 PROPOSE_ht_toggle_target: "Toggle target mode?"

 # ── Select Trigger Names ─────────────────────────────────────────────────────
 ht_select_any_to_continue: "Select Any Country"
 ht_select_target: "Select Target Country"
 ht_select_first_country: "Select First Country"
 ht_select_second_country: "Select Second Country"
 ht_select_source_country: "Select Source Country"
