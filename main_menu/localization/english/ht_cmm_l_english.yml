l_english:
 # Mod
 ht_name: "Host Tool"
 ht_desc: "Multiplayer host tool with configurable actions and transparency logging."

 # Tab
 ht__settings_name: "Settings"

 # Group
 ht__settings__amounts_name: "Amounts"

 # Settings
 ht__gold_amount_name: "Gold Amount"
 ht__gold_amount_desc: "Amount of gold to add with the Add Gold action. Negative values remove gold instead."
 ht__gold_amount_format: "[CMMV('ht__gold_amount')]"
 ht__manpower_amount_name: "Manpower Amount"
 ht__manpower_amount_desc: "Amount of manpower to add with the Add Manpower action. Negative values remove manpower instead."
 ht__manpower_amount_format: "[CMMV('ht__manpower_amount')]"
 ht__stability_amount_name: "Stability Amount"
 ht__stability_amount_desc: "Amount of stability to add with the Add Stability action. Negative values remove stability instead."
 ht__stability_amount_format: "[CMMV('ht__stability_amount')]"
 ht__prestige_amount_name: "Prestige Amount"
 ht__prestige_amount_desc: "Amount of prestige to add with the Add Prestige action. Negative values remove prestige instead."
 ht__prestige_amount_format: "[CMMV('ht__prestige_amount')]"
 ht__diplomats_amount_name: "Diplomats Amount"
 ht__diplomats_amount_desc: "Amount of diplomats to add with the Add Diplomats action. Negative values remove diplomats instead."
 ht__diplomats_amount_format: "[CMMV('ht__diplomats_amount')]"
 ht__truce_years_name: "Truce Duration (Years)"
 ht__truce_years_desc: "Duration of truces created by the Add Truce action."
 ht__truce_years_format: "[CMMV('ht__truce_years')]"
 ht__religion_conversion_percentage_name: "Religion Conversion Percentage"
 ht__religion_conversion_percentage_desc: "Percentage of pops converted to primary religion by the Convert Pops action."
 ht__religion_conversion_percentage_format: "[CMMV('ht__religion_conversion_percentage')]%"
 ht__culture_assimilation_percentage_name: "Culture Assimilation Percentage"
 ht__culture_assimilation_percentage_desc: "Percentage of pops assimilated to primary culture by the Assimilate Pops action."
 ht__culture_assimilation_percentage_format: "[CMMV('ht__culture_assimilation_percentage')]%"

 ht__war_exhaustion_amount_name: "War Exhaustion Amount"
 ht__war_exhaustion_amount_desc: "Amount of war exhaustion the Change War Exhaustion action applies. Negative values remove it, positive values add it."
 ht__war_exhaustion_amount_format: "[CMMV('ht__war_exhaustion_amount')]"
