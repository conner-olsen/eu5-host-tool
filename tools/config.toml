### Translation ###
source_language = "english" # Options: english, french, german, spanish, polish, russian, simp_chinese, turkish, braz_por, japanese, korean
translate_workshop_by_default = true # Auto-translate workshop title/description into other languages. You can also use -wp/--workshop-pages instead.
translate_change_notes_by_default = false # Should running translate.py translate change notes? You can also use -cn/--change-notes instead.
translate_submods_by_default = false # Should running translate.py include all submods from submods/? You can also use -s/--submods instead.
localization_translator = "deepl" # Options: deepl, gemini-3-flash
workshop_title_translator = "deepl" # Options: deepl, gemini-3-flash - highly recommended at least for title. But I would also recommend just using Gemini-3-Pro using the website (api has no free requests)
workshop_description_translator = "deepl" # Options: deepl, gemini-3-flash - better, but only 20 free requests per day (Each run takes 10 requests per description, and 10 per title)

# Prompts for use with Gemini-3-Flash #
gemini_localization_system_prompt = "You are a professional localization translator. The user's message is one value from a Europa Universalis localization file, sent without its key. Translate it into {target_language}. Preserve any bracketed tokens, variables, and EU5 markup exactly. Do not add commentary; output only the translated value as a single line of plain text, never localization keys, language headers, or file structure."
gemini_description_system_prompt = "You are a professional Steam mod page translator. Translate the user's Europa Unversalis mod description into {target_language}. Preserve all BBCode tags, list markers, URLs, and bracketed tokens exactly. Do not add commentary; output only the translated text."
gemini_title_system_prompt = "You are a professional Steam mod title translator. Translate the user's Europa Unversalis mod title into {target_language}. Do not add commentary; output only the translated title for use on the Steam Workshop mod page."
gemini_additional_context = "This is the 'Host Tools' mod, it is a utility mod that gives the host of multiplayer games additional tools to modify other players." # Optional: additional context appended to all Gemini translation prompts (localization, title, and description). e.g. "This mod is set in the fantasy world of X and uses terms like Y to mean Z"

### Uploading ####
workshop_upload_item_id = 3753299425 # Replace with your mod's Workshop item ID (0 creates a new item)
workshop_upload_item_id_dev = 0 # Optional: dev Workshop item ID for upload.py -d/--dev (0 creates a new item)
upload_mod_by_default = true # Should running upload.py upload the mod? You can also use -m/--mod instead.
upload_workshop_pages_by_default = true # Should running upload.py upload the mod's Workshop pages? You can also use -wp/--workshop-pages instead.
upload_only_on_version_change = false # If true, mod/submod uploads only run when the metadata.json version changed since the last successful upload.
upload_change_notes_by_default = false # Should running upload.py upload change notes? You can also use -cn/--change-notes instead.
upload_submods_by_default = false # Should running upload.py upload all submods from submods/? You can also use -s/--submods instead.
workshop_name = "" # Optional: override the release Workshop title when it should differ from the metadata.json name
workshop_dev_name = "" # Optional: override dev mod name for upload.py -d/--dev
workshop_version_card = "" # Optional: untranslated version card added to the Workshop title in every language. Bracket prefix formats: "1.x" for one version, "1.x & 1.y" for two versions, "1.x-1.y" for a version range. Suffix formats appended after the title: "- 1.x" or "- v1.x", optionally with a version name like "- v1.x Pavia"

### GUI Update ###
game_directory = "" # Path to EU5 game directory (e.g. "C:/Steam/steamapps/common/Europa Universalis V/game"). Auto-detected if empty.
beta_game_directory = "" # Path to the EU5 closed-beta game directory (Project Caesar Review), used with --beta. Auto-detected if empty.

